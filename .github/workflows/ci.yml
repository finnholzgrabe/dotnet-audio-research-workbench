name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore AudioResearch.sln

      - name: Verify formatting
        run: dotnet format AudioResearch.sln --verify-no-changes

      - name: Build
        run: dotnet build AudioResearch.sln -c Release --no-restore

      - name: Test
        run: dotnet test AudioResearch.sln -c Release --no-build --verbosity normal

      - name: Smoke-test CLI quick start
        run: |
          DLL=src/AudioResearch.Cli/bin/Release/net8.0/AudioResearch.Cli.dll
          dotnet "$DLL" version
          dotnet "$DLL" generate tone --freq 440 --seconds 1 --out samples/generated/tone.wav
          dotnet "$DLL" inspect samples/generated/tone.wav
          dotnet "$DLL" features summary samples/generated/tone.wav --out artifacts/summary.json
          dotnet "$DLL" ml baseline --out artifacts/baseline-report.json
